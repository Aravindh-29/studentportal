deploymentName: student-deployment
namespace: dev

labels:
  app: studentportal
  env: dev

replicas: 4
minReadySeconds: 30

selector:
  matchLabels:
    app: studentportal

strategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 25%
    maxUnavailable: 25%

containerSpec:
  name: student-container
  image: aravindh146/studentportal
  tag: v2
  containerPort: 8080

resources:
  requests:
    cpu: "500m"
    memory: "500Mi"
  limits:
    cpu: "1000m"
    memory: "1Gi"

livenessProbe:
  httpGet:
    path: /health/live
    port: 8080
  initialDelaySeconds: 35
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: /health/ready
    port: 8080
  initialDelaySeconds: 40
  periodSeconds: 10

secret:
  name: studentportal-secret
  key: ConnectionStrings__DefaultConnection

# ======= Service =========

service:
  name: student-service
  type: ClusterIP

  selector:
    app: studentportal

  ports:
    protocol: TCP
    port: 80
    targetPort: 8080

# ======= Secret =========

secrets:
  secretName: studentportal-secret
  stringData:
    ConnectionStrings__DefaultConnection: "Server=mysql;Database=StudentPortalDb;User=root;Password=Admin@123;"

# ======= HPA =========

hpa:
  enabled: true

  minReplicas: 4
  maxReplicas: 10

  targetCPUUtilizationPercentage: 50