---
trigger:
 branches:
  include:
      - main
pool:
 vmImage: ubuntu-22.04

stages:
    - stage: Restore
      jobs:
          - job: restorejob
            steps:
                - task: DotNetCoreCLI@2
                  inputs:
                      command: restore
          - job: Build
            steps:
              - task: DotNetCoreCLI@2
                inputs:
                  command: build
                