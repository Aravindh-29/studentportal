trigger:
  branches:
    include:
      - main

pool:
  vmImage: ubuntu-22.04

variables:
  buildConfiguration: Release

stages:
  - stage: Build
    displayName: Build Application
    jobs:
      - job: BuildJob
        steps:
          - checkout: self

          - task: UseDotNet@2
            displayName: Install .NET SDK
            inputs:
              packageType: 'sdk'
              version: '9.x'

          - task: SonarCloudPrepare@4
            displayName: Prepare SonarCloud Scan
            inputs:
              SonarQube: 'StudentPortal_Scan'
              organization: 'gurukul2026'
              scannerMode: 'dotnet'
              projectKey: 'gurukul2026'
              projectName: 'Gurukul2026'

          - task: DotNetCoreCLI@2
            displayName: Restore Packages
            inputs:
              command: restore
              projects: StudentPortal.csproj

          - task: DotNetCoreCLI@2
            displayName: Build Application
            inputs:
              command: build
              projects: StudentPortal.csproj
              arguments: '--configuration $(buildConfiguration)'

          - task: SonarCloudAnalyze@4
            displayName: Run SonarCloud Analysis

          - task: SonarCloudPublish@4
            displayName: Publish Quality Gate
            inputs:
              pollingTimeoutSec: '300'

          - task: DotNetCoreCLI@2
            displayName: Run Unit Tests
            condition: false
            inputs:
              command: test
              projects: '**/*Tests/*.csproj'

          - task: DotNetCoreCLI@2
            displayName: Run Tests with Code Coverage
            condition: false
            inputs:
              command: test
              projects: '**/*Tests/*.csproj'
              arguments: '--collect:"XPlat Code Coverage"'

          - task: DotNetCoreCLI@2
            displayName: Publish Application
            inputs:
              command: publish
              publishWebProjects: false
              projects: StudentPortal.csproj
              arguments: >
                --configuration $(buildConfiguration)
                --output $(Build.ArtifactStagingDirectory)

          - task: PublishBuildArtifacts@1
            displayName: Publish Artifacts
            inputs:
              PathtoPublish: '$(Build.ArtifactStagingDirectory)'
              ArtifactName: drop

  - stage: SecretScan
    displayName: Secret Scan
    dependsOn: Build
    jobs:
      - job: GitLeaks
        displayName: GitLeaks Secret Scan
        steps:
          - checkout: self

          - script: |
              GITLEAKS_VERSION=$(curl -s https://api.github.com/repos/gitleaks/gitleaks/releases/latest | grep '"tag_name"' | cut -d'"' -f4 | sed 's/v//')
              curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" -o gitleaks.tar.gz
              tar -xzf gitleaks.tar.gz
              ./gitleaks detect --source="$(Build.SourcesDirectory)" --verbose
            displayName: GitLeaks Scan

  - stage: DockerBuild
    displayName: Build & Scan Docker Image
    dependsOn: SecretScan
    jobs:
      - job: DockerBuildAndScanJob
        displayName: Docker Build + Trivy Scan
        steps:
          - checkout: self

          # Build locally WITHOUT containerRegistry so image is tagged
          # as plain "studentportal:<buildId>" — required for Trivy to find it
          - task: Docker@2
            displayName: Build Docker Image
            inputs:
              repository: 'studentportal'
              command: 'build'
              Dockerfile: Dockerfile
              tags: |
                $(Build.BuildId)
                latest

          - script: |
              echo "======== DOCKER IMAGES =========="
              docker images
            displayName: Show Docker Images

          - script: |
              curl -sSfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
              mkdir -p $(Build.ArtifactStagingDirectory)/trivy-reports

              echo "====== Saving Table Report ======"
              trivy image \
                --severity HIGH,CRITICAL \
                --no-progress \
                --format table \
                --output $(Build.ArtifactStagingDirectory)/trivy-reports/trivy-report.txt \
                studentportal:$(Build.BuildId)

              echo "====== Saving JSON Report ======"
              trivy image \
                --severity HIGH,CRITICAL \
                --no-progress \
                --format json \
                --output $(Build.ArtifactStagingDirectory)/trivy-reports/trivy-report.json \
                studentportal:$(Build.BuildId)

              echo "====== Enforcing Gate (fail on HIGH/CRITICAL) ======"
              trivy image \
                --exit-code 1 \
                --severity HIGH,CRITICAL \
                --ignore-unfixed \
                --no-progress \
                studentportal:$(Build.BuildId)
            displayName: Trivy Image Scan

          - task: PublishBuildArtifacts@1
            displayName: Publish Trivy Report
            condition: always()
            inputs:
              PathtoPublish: '$(Build.ArtifactStagingDirectory)/trivy-reports'
              ArtifactName: trivy-scan-report

  - stage: DockerPush
    displayName: Push Docker Image to ACR
    dependsOn: DockerBuild
    jobs:
      - job: DockerPushJob
        displayName: Docker Push
        steps:
          - checkout: self

          # Fresh VM — rebuild with ACR service connection so image gets
          # the full ACR-prefixed tag, then push immediately
          - task: Docker@2
            displayName: Build Docker Image for ACR
            inputs:
              containerRegistry: 'studentportal'
              repository: 'studentportal'
              command: 'build'
              Dockerfile: Dockerfile
              tags: |
                $(Build.BuildId)
                latest

          - task: Docker@2
            displayName: Push Image to ACR
            inputs:
              containerRegistry: 'studentportal'
              repository: 'studentportal'
              command: 'push'
              tags: |
                $(Build.BuildId)
                latest